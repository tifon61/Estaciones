<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoreo Meteorológico - EMA EP 23</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f1f5f9; /* Fondo gris muy claro para contraste */
            color: #334155; 
            margin: 0; 
            overflow-x: hidden;
        }

        .card { 
            background: linear-gradient(145deg, #ffffff 0%, #f8fafc 100%);
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 15px -3px rgba(0, 0, 0, 0.05), 0 2px 6px -2px rgba(0, 0, 0, 0.025);
            border-radius: 16px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        .metric-title {
            color: #64748b;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .metric-value {
            font-size: 2rem;
            font-weight: 800;
            line-height: 1.2;
        }

        .tab-btn {
            background-color: transparent;
            color: #64748b;
            border: 1px solid transparent;
            transition: all 0.2s ease;
        }

        .tab-btn:hover {
            color: #0f172a;
            background-color: #e2e8f0;
        }

        .tab-btn.active { 
            background-color: #004b87; 
            color: white; 
            box-shadow: 0 4px 6px -1px rgba(0, 75, 135, 0.3);
            border-radius: 8px;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #e2e8f0; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        
        input[type="datetime-local"] {
            color: #1e293b;
            background-color: #ffffff;
        }
    </style>
</head>
<body class="p-4 md:p-6 lg:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="card p-6 mb-6 flex flex-col md:flex-row justify-between items-center gap-6 border-t-4 border-t-[#004b87] bg-white">
            <div class="flex items-center gap-5 w-full md:w-auto">
                <div class="w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center border border-blue-100 shrink-0 shadow-sm">
                    <i class="fa-solid fa-school text-2xl text-[#004b87]"></i>
                </div>
                <div>
                    <h1 class="text-2xl md:text-3xl font-extrabold text-slate-800 tracking-tight">Red de Monitoreo Ambiental</h1>
                    <p class="text-slate-500 font-medium mt-1 text-sm"><i class="fa-solid fa-location-dot mr-1"></i> EMA Escuela Primaria N° 23</p>
                </div>
            </div>
            
            <div class="flex flex-col items-end gap-2">
                <span id="systemStatus" class="bg-slate-100 text-slate-600 text-xs font-bold px-3 py-1.5 rounded-full uppercase tracking-wide border border-slate-200">
                    <i class="fa-solid fa-arrows-rotate mr-1 animate-spin"></i> Cargando datos...
                </span>
                <span class="text-[10px] text-slate-400 font-medium">Factor Pluviómetro: 0.68mm</span>
            </div>
        </header>

        <div class="flex flex-col xl:flex-row justify-between items-center gap-4 mb-6 bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
            <div class="flex gap-1 w-full xl:w-auto bg-slate-100 p-1 rounded-xl">
                <button onclick="setPreset('day')" id="btn-day" class="tab-btn active flex-1 xl:flex-none px-6 py-2 text-sm font-bold">Hoy</button>
                <button onclick="setPreset('week')" id="btn-week" class="tab-btn flex-1 xl:flex-none px-6 py-2 text-sm font-bold">Semana</button>
                <button onclick="setPreset('month')" id="btn-month" class="tab-btn flex-1 xl:flex-none px-6 py-2 text-sm font-bold">Mes</button>
            </div>

            <div class="flex flex-col sm:flex-row items-center gap-3 w-full xl:w-auto">
                <div class="flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-lg px-3 py-1.5 w-full sm:w-auto">
                    <label class="font-bold text-[10px] text-slate-400 uppercase">Desde</label>
                    <input type="datetime-local" id="startDatetime" class="bg-transparent border-none text-sm outline-none w-full">
                </div>
                <div class="flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-lg px-3 py-1.5 w-full sm:w-auto">
                    <label class="font-bold text-[10px] text-slate-400 uppercase">Hasta</label>
                    <input type="datetime-local" id="endDatetime" class="bg-transparent border-none text-sm outline-none w-full">
                </div>
                <button onclick="updateDashboard(true)" class="bg-[#004b87] hover:bg-[#003865] text-white px-5 py-2.5 rounded-lg transition-colors font-bold shadow-md w-full sm:w-auto flex items-center justify-center text-sm">
                    <i class="fa-solid fa-magnifying-glass mr-2"></i>Consultar
                </button>
            </div>
        </div>

        <div class="grid grid-cols-2 lg:grid-cols-5 gap-4 mb-6">
            <div class="card p-5 relative overflow-hidden">
                <div class="flex justify-between items-start mb-2">
                    <span class="metric-title">Temperatura</span>
                    <i class="fa-solid fa-temperature-half text-orange-500 opacity-80"></i>
                </div>
                <div class="flex items-baseline gap-1 relative
